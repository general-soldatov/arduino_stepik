- code:
    question:
      types: code
      text_data: |
        Как вы догадались, время помогать! Маше требуется помощь в кодировании сигнала SOS. Светодиод мы подключаем к выводу номер 5, после чего напишем код по следующему правилу:
        ```
        Точка - 500 миллисекунд
        Тире - 1000 миллисекунд
        ```
        И оставляем работать сигнал в бесконечном цикле функции `loop()`. Не забудь про использование циклических конструкций в программе!
    answer:
      sample_size: 1
      feedback:
        correct: 'Оказывается, что права Маша!'
        wrong: ''
