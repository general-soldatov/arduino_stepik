          Serial.begin(115200);
        }
        void loop() {
          Serial.print("*");
          delay(500);
        }
        ```
      code_path: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Звёздочку каждые 0.5 секунды без перевода строки
      wrong:
      - Звёздочку каждую секунду с новой строки
      - Один раз * и ничего больше
      - Ничего, так как нет Serial.println()
