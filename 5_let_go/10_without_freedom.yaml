- choice:
    question:
      types: choice
      text_data: В чём разница между `digitalWrite()` и `analogWrite()`?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - digitalWrite() устанавливает HIGH (5V) или LOW (0V), analogWrite() устанавливает
        ШИМ-сигнал со скважностью 0-255 для управления яркостью
      wrong:
      - digitalWrite() работает только с аналоговыми пинами, analogWrite() — с цифровыми
      - digitalWrite() медленнее analogWrite()
      - Это одно и то же, analogWrite() — устаревший синоним digitalWrite()
