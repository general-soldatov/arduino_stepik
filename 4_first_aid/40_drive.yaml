- choice:
    question:
      types: choice
      text_data: Для чего обычно используется реле в проектах на Arduino?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Для управления мощной нагрузкой (освещение, насосы, двигатели) от слаботочных
        выходов микроконтроллера
      wrong:
      - Для измерения температуры окружающей среды
      - Для увеличения тактовой частоты процессора
      - Для беспроводной передачи данных
