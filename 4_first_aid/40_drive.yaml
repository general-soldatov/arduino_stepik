- choice:
    question:
      types: choice
      text_data: Как правильно прочитать состояние датчика (например, кнопки), чтобы
        потом включить реле?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - int sensorState = digitalRead(sensorPin);
      wrong:
      - int sensorState = analogRead(sensorPin);
      - digitalWrite(sensorPin, HIGH);
      - pinMode(sensorPin, OUTPUT); sensorState = digitalRead(sensorPin);
- choice:
    question:
      types: choice
      text_data: При использовании директивы `#define RELAY_PIN 7`, какой командой
        можно включить реле (модуль с низким уровнем включения, `LOW` активирует реле)?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - digitalWrite(RELAY_PIN, LOW);
      wrong:
      - digitalWrite(7, HIGH);
      - analogWrite(RELAY_PIN, 255);
      - digitalRead(RELAY_PIN, LOW);
- choice:
    question:
      types: choice
      text_data: Какие меры предосторожности нужно соблюдать при работе с реле? (Выберите
        несколько)
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Изолировать высоковольтную часть (220В) от низковольтной
      - Использовать защитный диод, если реле подключено напрямую (не модулем) к транзистору
      - Убедиться, что ток коммутации не превышает допустимый для контактов реле
      wrong:
      - Подавать на управляющий пин реле ШИМ-сигнал
      - Подключать реле к аналоговым пинам
      - Обязательно использовать пин 13, так как только он подходит для реле
